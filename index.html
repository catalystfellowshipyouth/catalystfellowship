<link rel="apple-touch-icon" sizes="180x180" href="favicon-180.png">
<link rel="icon" type="image/png" sizes="512x512" href="favicon.png">
<style>
  :root{
    --navy: #12233F;
    --navy-2: #1E3A5F;
    --cream: #FAF8F3;
    --paper: #F4F1E9;
    --muted: #5E6B7A;
    --gold: #B98A2E;
    --line: #D9D3C4;
    --warn: #A8482B;
    --ok: #3E6B4F;
    --serif: "Iowan Old Style", "Palatino Linotype", Palatino, "URW Palladio L", Georgia, serif;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    --mono: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    background:var(--cream);
    color:var(--navy);
    font-family:var(--sans);
    -webkit-font-smoothing:antialiased;
    overflow:hidden;
  }

  #app{
    position:relative;
    width:100%;
    height:100vh;
    display:flex;
    flex-direction:column;
  }

  /* Progress rail */
  .rail{
    position:relative;
    height:44px;
    flex:0 0 auto;
    display:flex;
    align-items:center;
    padding:0 clamp(20px,5vw,64px);
    border-bottom:1px solid var(--line);
    opacity:0;
    transition:opacity .4s ease;
  }
  .rail.show{opacity:1;}
  .rail-track{
    position:relative;
    flex:1;
    height:1px;
    background:var(--line);
  }
  .rail-fill{
    position:absolute;
    top:0; left:0; height:1px;
    background:var(--navy);
    transition:width .5s cubic-bezier(.65,0,.35,1);
  }
  .rail-ticks{
    position:absolute; top:-3px; left:0; right:0;
    display:flex; justify-content:space-between;
    pointer-events:none;
  }
  .rail-ticks span{
    width:1px; height:7px; background:var(--line);
  }
  .rail-ticks span.done{ background:var(--navy); }
  .rail-label{
    font-family:var(--mono);
    font-size:11px;
    letter-spacing:.06em;
    color:var(--muted);
    margin-left:20px;
    white-space:nowrap;
  }

  /* Screens */
  .stage{
    flex:1 1 auto;
    position:relative;
    overflow:hidden;
  }
  .screen{
    position:absolute;
    inset:0;
    display:flex;
    flex-direction:column;
    justify-content:center;
    padding:6vh clamp(24px,8vw,120px);
    opacity:0;
    transform:translateY(14px);
    transition:opacity .45s ease, transform .45s ease;
    pointer-events:none;
    overflow-y:auto;
  }
  .screen.active{
    opacity:1;
    transform:translateY(0);
    pointer-events:auto;
  }
  .screen.leaving{
    opacity:0;
    transform:translateY(-14px);
  }

  .eyebrow{
    font-family:var(--mono);
    font-size:12px;
    letter-spacing:.12em;
    text-transform:uppercase;
    color:var(--gold);
    margin-bottom:18px;
  }

  .ghost-num{
    position:absolute;
    top:2vh;
    right:clamp(24px,6vw,90px);
    font-family:var(--serif);
    font-size:min(22vw,220px);
    line-height:1;
    color:var(--navy);
    opacity:.045;
    font-style:italic;
    pointer-events:none;
    user-select:none;
  }

  h1.hero{
    font-family:var(--serif);
    font-weight:400;
    font-size:clamp(28px,4.2vw,46px);
    line-height:1.18;
    max-width:16ch;
    margin:0 0 22px 0;
    color:var(--navy);
  }
  p.sub{
    font-family:var(--sans);
    font-size:16px;
    line-height:1.65;
    color:var(--muted);
    max-width:56ch;
    margin:0 0 30px 0;
  }

  .rules{
    list-style:none;
    padding:0; margin:0 0 40px 0;
    max-width:56ch;
    border-top:1px solid var(--line);
  }
  .rules li{
    font-size:14.5px;
    color:var(--navy-2);
    padding:13px 0;
    border-bottom:1px solid var(--line);
    display:flex;
    gap:14px;
  }
  .rules li::before{
    content:"—";
    color:var(--gold);
    flex:0 0 auto;
  }

  .btn{
    font-family:var(--sans);
    font-size:14.5px;
    font-weight:600;
    letter-spacing:.01em;
    border:1px solid var(--navy);
    background:var(--navy);
    color:var(--cream);
    padding:14px 30px;
    cursor:pointer;
    border-radius:2px;
    transition:background .2s ease, color .2s ease, opacity .2s ease, transform .1s ease;
  }
  .btn:hover{background:var(--navy-2); border-color:var(--navy-2);}
  .btn:active{transform:translateY(1px);}
  .btn:disabled{
    opacity:.35;
    cursor:not-allowed;
    background:var(--navy);
  }
  .btn.ghost{
    background:transparent;
    color:var(--navy);
    border:1px solid var(--line);
  }
  .btn.ghost:hover{border-color:var(--navy); background:transparent;}

  .row-actions{
    display:flex;
    align-items:center;
    gap:16px;
    margin-top:8px;
  }
  .hint{
    font-family:var(--mono);
    font-size:11.5px;
    color:var(--muted);
    letter-spacing:.03em;
  }

  /* Acknowledgment screen */
  .ack-box{
    max-width:62ch;
    border:1px solid var(--line);
    background:var(--paper);
    padding:26px 28px;
    margin:26px 0 32px 0;
  }
  .ack-box p{
    font-family:var(--serif);
    font-style:italic;
    font-size:16.5px;
    line-height:1.7;
    color:var(--navy-2);
    margin:0;
  }
  .check-row{
    display:flex;
    align-items:flex-start;
    gap:14px;
    max-width:62ch;
    margin-bottom:34px;
    cursor:pointer;
  }
  .check-row input{
    appearance:none;
    -webkit-appearance:none;
    width:20px; height:20px;
    flex:0 0 auto;
    margin-top:2px;
    border:1.5px solid var(--navy);
    background:var(--cream);
    cursor:pointer;
    position:relative;
    border-radius:2px;
  }
  .check-row input:checked{ background:var(--navy); }
  .check-row input:checked::after{
    content:"";
    position:absolute;
    left:6px; top:2px;
    width:5px; height:10px;
    border:solid var(--cream);
    border-width:0 2px 2px 0;
    transform:rotate(45deg);
  }
  .check-row label{
    font-size:14.5px;
    color:var(--navy);
    line-height:1.55;
    cursor:pointer;
  }

  /* Question screens */
  .q-meta{
    display:flex;
    gap:12px;
    align-items:center;
    margin-bottom:20px;
  }
  .tag{
    font-family:var(--mono);
    font-size:10.5px;
    letter-spacing:.08em;
    text-transform:uppercase;
    color:var(--navy-2);
    border:1px solid var(--line);
    padding:4px 9px;
  }
  .tag.req{ color:var(--warn); border-color:var(--warn); }
  .tag.opt{ color:var(--muted); }

  h2.q-title{
    font-family:var(--serif);
    font-weight:400;
    font-size:clamp(22px,2.6vw,30px);
    line-height:1.4;
    max-width:42ch;
    margin:0 0 28px 0;
    color:var(--navy);
  }

  textarea{
    width:100%;
    max-width:66ch;
    min-height:150px;
    font-family:var(--sans);
    font-size:16px;
    line-height:1.6;
    color:var(--navy);
    background:transparent;
    border:none;
    border-bottom:1.5px solid var(--line);
    padding:6px 2px 16px 2px;
    resize:vertical;
    outline:none;
    transition:border-color .2s ease;
  }
  textarea:focus{ border-bottom-color:var(--navy); }
  textarea::placeholder{ color:#B7AF9C; font-style:italic; }

  .meta-row{
    display:flex;
    justify-content:space-between;
    max-width:66ch;
    margin-top:10px;
    margin-bottom:30px;
  }
  .wc{
    font-family:var(--mono);
    font-size:12px;
    color:var(--muted);
    letter-spacing:.02em;
  }
  .wc.warn{ color:var(--warn); }
  .wc.ok{ color:var(--ok); }

  /* Applicant info screen */
  .info-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:26px 32px;
    max-width:66ch;
    margin-bottom:34px;
  }
  .field{
    display:flex;
    flex-direction:column;
    gap:8px;
  }
  .field.full{ grid-column:1 / -1; }
  .field label{
    font-family:var(--mono);
    font-size:10.5px;
    letter-spacing:.09em;
    text-transform:uppercase;
    color:var(--muted);
  }
  .field input, .field select{
    font-family:var(--sans);
    font-size:16px;
    color:var(--navy);
    background:transparent;
    border:none;
    border-bottom:1.5px solid var(--line);
    padding:6px 2px 10px 2px;
    outline:none;
    transition:border-color .2s ease;
    -webkit-appearance:none;
    appearance:none;
    border-radius:0;
  }
  .field select{
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6'><path d='M0 0L5 6L10 0' fill='%235E6B7A'/></svg>");
    background-repeat:no-repeat;
    background-position:right 4px center;
    padding-right:18px;
  }
  .field input:focus, .field select:focus{ border-bottom-color:var(--navy); }
  .field input::placeholder{ color:#B7AF9C; font-style:italic; }
  .field select:invalid{ color:#8A8578; }

  @media (max-width:640px){
    .info-grid{ grid-template-columns:1fr; }
  }

  /* Closing */
  .close-mark{
    width:34px; height:1px;
    background:var(--gold);
    margin-bottom:26px;
  }

  @media (max-width:640px){
    .ghost-num{ display:none; }
    .rules li{ font-size:13.5px; }
  }

  .logo-row{
    display:flex;
    align-items:center;
    gap:16px;
    margin-bottom:22px;
  }
  .logo-mark{
    width:56px;
    height:56px;
    object-fit:contain;
    flex:0 0 auto;
  }
  .logo-word{
    font-family:var(--mono);
    font-size:12px;
    font-weight:600;
    letter-spacing:.1em;
    text-transform:uppercase;
    color:var(--navy-2);
    line-height:1.5;
  }

  /* Loading screen */
  #loader{
    position:fixed;
    inset:0;
    z-index:999;
    background:var(--cream);
    display:flex;
    align-items:center;
    justify-content:center;
    transition:opacity .6s ease, visibility .6s ease;
  }
  #loader.hide{
    opacity:0;
    visibility:hidden;
    pointer-events:none;
  }
  .loader-inner{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:22px;
  }
  .loader-mark{
    width:64px;
    height:64px;
    object-fit:contain;
    animation:loaderPulse 1.6s ease-in-out infinite;
  }
  @keyframes loaderPulse{
    0%, 100%{ transform:scale(1); opacity:.85; }
    50%{ transform:scale(1.08); opacity:1; }
  }
  .loader-track{
    width:180px;
    height:1px;
    background:var(--line);
    position:relative;
    overflow:hidden;
  }
  .loader-track::after{
    content:"";
    position:absolute;
    top:0; left:0;
    height:100%;
    width:40%;
    background:var(--navy);
    animation:loaderSweep 1.4s ease-in-out infinite;
  }
  @keyframes loaderSweep{
    0%{ left:-40%; }
    100%{ left:100%; }
  }
  .loader-label{
    font-family:var(--mono);
    font-size:11px;
    letter-spacing:.14em;
    text-transform:uppercase;
    color:var(--muted);
  }
  @media (prefers-reduced-motion: reduce){
    .loader-mark{ animation:none; }
    .loader-track::after{ animation:none; left:0; width:100%; }
  }
  .sr-only{
    position:absolute; width:1px; height:1px;
    overflow:hidden; clip:rect(0,0,0,0);
  }
</style>
</head>
<body>
<div id="loader">
  <div class="loader-inner">
    <img class="loader-mark" id="loaderMark" src="" alt="">
    <div class="loader-track"></div>
    <div class="loader-label">Preparing your application</div>
  </div>
</div>
<div id="app">
  <div class="rail" id="rail">
    <span class="rail-label" id="railLabel">00 / 10</span>
    <div class="rail-track">
      <div class="rail-fill" id="railFill"></div>
      <div class="rail-ticks" id="railTicks"></div>
    </div>
  </div>
  <div class="stage" id="stage"></div>
</div>

      type: "Long answer", required: false,
      title: "Is there anything about how you think about the world — a framework, a value, a question you keep returning to — that makes you a good fit for this fellowship?",
      prompt: "Use this space for anything the previous questions did not give you room to express."
    }
  ];

  var TOTAL = QUESTIONS.length;
  var state = { screen: 0, ack: false, answers: new Array(TOTAL).fill("") };
  var stage = document.getElementById('stage');
  var rail = document.getElementById('rail');
  var railFill = document.getElementById('railFill');
  var railTicks = document.getElementById('railTicks');
  var railLabel = document.getElementById('railLabel');

  // build ticks
  for (var t=0; t<TOTAL; t++){
    var s = document.createElement('span');
    railTicks.appendChild(s);
  }

  // screen indices: 0 welcome, 1 ack, 2..11 questions, 12 closing
  var SEND_SCREEN = 2 + TOTAL;   // "open email to submit" screen
  var LAST = 3 + TOTAL;          // final closing screen (exact spec text)

  function countWords(str){
    str = str.trim();
    if(!str) return 0;
    return str.split(/\s+/).length;
  }

  function updateRail(){
    if(state.screen < 1 || state.screen > 1+TOTAL){
      rail.classList.remove('show');
      return;
    }
    rail.classList.add('show');
    var qIndex = state.screen === 1 ? 0 : state.screen - 1; // ack counts as position 0
    var pct = (qIndex / TOTAL) * 100;
    railFill.style.width = pct + '%';
    railLabel.textContent = (qIndex < 10 ? '0'+qIndex : qIndex) + ' / ' + TOTAL;
    var ticks = railTicks.children;
    for(var i=0;i<ticks.length;i++){
      ticks[i].classList.toggle('done', i < qIndex);
    }
  }

  function render(){
    stage.innerHTML = '';
    var el = document.createElement('div');
    el.className = 'screen active';

    if(state.screen === 0){
      el.innerHTML =
        '<div class="logo-row"><img class="logo-mark" src="' + LOGO_B64 + '" alt="Catalyst Fellowship mark"><span class="logo-word">Catalyst<br>Youth Fellowship</span></div>' +
        '<h1 class="hero">Application</h1>' +
        '<p class="sub">This is a competitive, 8-week fellowship on global ethics, evidence-based thinking, and high-impact decision making. Seats are extremely limited. Read every question carefully before answering.</p>' +
        '<div class="row-actions"><button class="btn" id="startBtn">Begin application</button>' +
        '<span class="hint">~10 questions · 20–30 minutes</span></div>';
    }
    else if(state.screen === 1){
      el.innerHTML =
        '<div class="eyebrow">Before you begin</div>' +
        '<h2 class="q-title">Please read this carefully.</h2>' +
        '<ul class="rules">' +
          '<li>Answer every question in your own words</li>' +
          '<li>There are no correct answers — we are evaluating how you think, not what you know</li>' +
          '<li>Word limit per answer: 150–250 words</li>' +
          '<li>AI use is strictly forbidden and will be detected</li>' +
        '</ul>' +
        '<div class="ack-box"><p>“I confirm that every answer in this application is entirely my own work. I have not used AI tools (including ChatGPT, Claude, or any other AI assistant) to write or assist any response. I understand that all submissions will be processed through AI detection software, and that any detected AI use will result in immediate disqualification.”</p></div>' +
        '<div class="check-row" id="checkRow">' +
          '<input type="checkbox" id="ackBox" ' + (state.ack ? 'checked' : '') + '>' +
          '<label for="ackBox">I have read and agree to the statement above.</label>' +
        '</div>' +
        '<div class="row-actions"><button class="btn ghost" id="backBtn">Back</button>' +
        '<button class="btn" id="continueBtn" ' + (state.ack ? '' : 'disabled') + '>Continue</button></div>';
    }
    else if(state.screen >= 2 && state.screen <= 1+TOTAL){
      var qi = state.screen - 2;
      var q = QUESTIONS[qi];
      el.innerHTML =
        '<div class="ghost-num">' + (qi<9?'0':'') + (qi+1) + '</div>' +
        '<div class="q-meta">' +
          '<span class="tag">' + q.type + '</span>' +
          '<span class="tag ' + (q.required ? 'req' : 'opt') + '">' + (q.required ? 'Required' : 'Optional') + '</span>' +
        '</div>' +
        '<h2 class="q-title">' + q.title + '</h2>' +
        '<p class="sub" style="margin-bottom:16px;max-width:60ch;">' + q.prompt + '</p>' +
        '<textarea id="answerBox" placeholder="Type your answer here…">' + (state.answers[qi]||'') + '</textarea>' +
        '<div class="meta-row"><span class="wc" id="wcLabel"></span><span class="hint">Question ' + (qi+1) + ' of ' + TOTAL + '</span></div>' +
        '<div class="row-actions"><button class="btn ghost" id="backBtn">Back</button>' +
        '<button class="btn" id="continueBtn">' + (qi === TOTAL-1 ? 'Review & submit' : 'Continue') + '</button></div>';
    }
    else if(state.screen === SEND_SCREEN){
      el.innerHTML =
        '<div class="close-mark"></div>' +
        '<div class="eyebrow">Almost done</div>' +
        '<h1 class="hero" style="max-width:20ch;">One last step.</h1>' +
        '<p class="sub">Click below to send your application. There is no need to open an email app — your answers are sent directly.</p>' +
        '<div class="row-actions"><button class="btn ghost" id="backBtn">Back</button>' +
        '<button class="btn" id="sendBtn">Submit application</button></div>' +
        '<p class="hint" id="sendingNote" style="margin-top:22px;display:none;">Sending…</p>' +
        '<p class="hint" id="errorNote" style="margin-top:22px;display:none;color:#A8482B;">Something went wrong sending your application. Please check your connection and try again.</p>';
    }
    else if(state.screen === LAST){
      el.innerHTML =
        '<div class="close-mark"></div>' +
        '<div class="eyebrow">Application received</div>' +
        '<h1 class="hero" style="max-width:20ch;">Application Submitted</h1>' +
        '<p class="sub">Thank you for applying to the Catalyst Youth Fellowship. We review every application carefully. If you are selected to move forward, you will hear from us within 3 weeks. Please do not follow up before that window has passed.</p>';
    }

    stage.appendChild(el);
    wireScreen(qCurrentIndex());
    updateRail();
  }

  function qCurrentIndex(){
    if(state.screen>=2 && state.screen<=1+TOTAL) return state.screen-2;
    return -1;
  }

  function goTo(n){
    if(n<0 || n>LAST) return;
    state.screen = n;
    render();
    window.scrollTo(0,0);
  }

  function submitApplication(onDone){
    var payload = {
      _subject: "New Catalyst Youth Fellowship application"
    };
    QUESTIONS.forEach(function(q, i){
      payload['Q' + (i+1) + ' — ' + q.title] = state.answers[i] && state.answers[i].trim() ? state.answers[i].trim() : '(left blank)';
    });
    fetch(SUBMIT_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
      body: JSON.stringify(payload)
    })
    .then(function(res){
      if(!res.ok) throw new Error('Bad response');
      onDone(true);
    })
    .catch(function(err){
      console.error('Submission failed:', err);
      onDone(false);
    });
  }

  function wireScreen(qi){
    var startBtn = document.getElementById('startBtn');
    if(startBtn){ startBtn.addEventListener('click', function(){ goTo(1); }); }

    var backBtn = document.getElementById('backBtn');
    if(backBtn){ backBtn.addEventListener('click', function(){ goTo(state.screen-1); }); }

    var ackBox = document.getElementById('ackBox');
    var continueBtn = document.getElementById('continueBtn');

    if(ackBox){
      ackBox.addEventListener('change', function(){
        state.ack = ackBox.checked;
        continueBtn.disabled = !state.ack;
      });
      var checkRow = document.getElementById('checkRow');
      checkRow.addEventListener('click', function(e){
        if(e.target.tagName.toLowerCase() !== 'input'){
          ackBox.checked = !ackBox.checked;
          state.ack = ackBox.checked;
          continueBtn.disabled = !state.ack;
        }
      });
    }

    if(qi >= 0){
      var box = document.getElementById('answerBox');
      var wc = document.getElementById('wcLabel');
      function refreshCount(){
        var n = countWords(box.value);
        var label = n + ' word' + (n===1?'':'s');
        var cls = 'wc';
        if(n>0 && n<150){ cls += ' warn'; label += ' — below 150'; }
        else if(n>250){ cls += ' warn'; label += ' — over 250'; }
        else if(n>=150 && n<=250){ cls += ' ok'; label += ' — within range'; }
        wc.textContent = label;
        wc.className = cls;
      }
      box.addEventListener('input', function(){
        state.answers[qi] = box.value;
        refreshCount();
      });
      refreshCount();
    }

    if(continueBtn && state.screen !== 1){
      continueBtn.addEventListener('click', function(){
        goTo(state.screen+1);
      });
    } else if(continueBtn && state.screen === 1){
      continueBtn.addEventListener('click', function(){
        if(state.ack) goTo(state.screen+1);
      });
    }

    var sendBtn = document.getElementById('sendBtn');
    if(sendBtn){
      sendBtn.addEventListener('click', function(){
        var sendingNote = document.getElementById('sendingNote');
        var errorNote = document.getElementById('errorNote');
        errorNote.style.display = 'none';
        sendingNote.style.display = 'block';
        sendBtn.disabled = true;
        submitApplication(function(success){
          if(success){
            goTo(LAST);
          } else {
            sendingNote.style.display = 'none';
            errorNote.style.display = 'block';
            sendBtn.disabled = false;
          }
        });
      });
    }
  }

  function playChime(){
    try{
      var Ctx = window.AudioContext || window.webkitAudioContext;
      var ctx = new Ctx();
      var now = ctx.currentTime;
      var notes = [523.25, 659.25, 783.99]; // C5, E5, G5 — simple ascending chime
      notes.forEach(function(freq, i){
        var osc = ctx.createOscillator();
        var gain = ctx.createGain();
        osc.type = 'sine';
        osc.frequency.value = freq;
        var start = now + i * 0.11;
        gain.gain.setValueAtTime(0, start);
        gain.gain.linearRampToValueAtTime(0.12, start + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.0001, start + 0.5);
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start(start);
        osc.stop(start + 0.55);
      });
    }catch(e){ /* audio not available — fail silently */ }
  }

  function initApp(){
    render();
    var loaderMark = document.getElementById('loaderMark');
    if(loaderMark){ loaderMark.src = LOGO_B64; }
    var minDelay = 1400;
    var start = Date.now();
    function reveal(){
      var elapsed = Date.now() - start;
      var wait = Math.max(0, minDelay - elapsed);
      setTimeout(function(){
        playChime();
        document.getElementById('loader').classList.add('hide');
      }, wait);
    }
    if(document.readyState === 'complete'){ reveal(); }
    else { window.addEventListener('load', reveal); }
  }

  initApp();
})();
</script>
</body>
</html>
